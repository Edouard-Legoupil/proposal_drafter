[pytest]
# Test discovery - only look in tests/ subdirectory of playwright/
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Test execution
addopts = -v --tb=short

# Prevent pytest from looking outside playwright directory
norecursedirs = backend venv .git __pycache__ *.egg-info

# Custom markers for test categorization
markers = 
    slow: marks tests as slow (deselect with '-m "not slow"')
    smoke: marks tests as smoke tests (quick sanity checks)
    regression: marks tests as regression tests
    user_registration: Tests related to user registration and authentication
    proposal_creation: Tests for proposal creation and editing
    knowledge_card: Tests for knowledge card management
    peer_review: Tests for peer review workflow
    dashboard: Tests for dashboard functionality
    e2e: End-to-end user journey tests

# Reporting
console_output_style = classic

# Parallel execution (if needed)
# addopts = -n auto
